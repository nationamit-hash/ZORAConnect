<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Ribbon top and bottom main color gradient -->
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F15A24" />
      <stop offset="100%" stop-color="#FF7F4D" />
    </linearGradient>
    
    <!-- Ribbon back/shadow fold gradient -->
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C83B0E" />
      <stop offset="100%" stop-color="#F15A24" />
    </linearGradient>

    <!-- Subtle drop shadow for the Z ribbon -->
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4E2817" flood-opacity="0.12" />
    </filter>
  </defs>

  <style>
    .brand-title {
      font-family: 'Inter', 'Outfit', 'Space Grotesk', sans-serif;
      font-weight: 900;
      fill: #F15A24;
      font-size: 51px;
      letter-spacing: 2px;
    }
    .brand-tagline {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      font-weight: 700;
      fill: #4E2817;
      font-size: 19px;
      letter-spacing: 5px;
    }
    .grid-line {
      stroke: #EAEAEA;
      stroke-width: 1px;
    }
  </style>

  <!-- Clean, high-contrast white background with subtle layout grid pattern (matching original design aesthetic) -->
  <rect width="100%" height="100%" fill="#FFFFFF" />
  
  <!-- Subtle design Grid background (like the architect draft pattern in the image) -->
  <g opacity="0.45">
    <line x1="50" y1="0" x2="50" y2="500" class="grid-line" />
    <line x1="100" y1="0" x2="100" y2="500" class="grid-line" />
    <line x1="150" y1="0" x2="150" y2="500" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="500" class="grid-line" />
    <line x1="250" y1="0" x2="250" y2="500" class="grid-line" />
    <line x1="300" y1="0" x2="300" y2="500" class="grid-line" />
    <line x1="350" y1="0" x2="350" y2="500" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="500" class="grid-line" />
    <line x1="450" y1="0" x2="450" y2="500" class="grid-line" />
    
    <line x1="0" y1="50" x2="500" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="500" y2="100" class="grid-line" />
    <line x1="0" y1="150" x2="500" y2="150" class="grid-line" />
    <line x1="0" y1="200" x2="500" y2="200" class="grid-line" />
    <line x1="0" y1="250" x2="500" y2="250" class="grid-line" />
    <line x1="0" y1="300" x2="500" y2="300" class="grid-line" />
    <line x1="0" y1="350" x2="500" y2="350" class="grid-line" />
    <line x1="0" y1="400" x2="500" y2="400" class="grid-line" />
    <line x1="0" y1="450" x2="500" y2="450" class="grid-line" />
  </g>

  <!-- Arch outline -->
  <path d="M165,280 L165,160 A85,85 0 0,1 335,160 L335,280 Z" stroke="#4E2817" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Z ribbon layout -->
  <g filter="url(#subtleShadow)">
    <!-- Top Horizontal Ribbon block -->
    <path d="M195,120 L278,120 L305,147 L195,147 Z" fill="url(#ribbonGrad)" />
    
    <!-- Top folded shadow/depth segment -->
    <path d="M278,120 L305,147 L278,147 Z" fill="#C83B0E" opacity="0.8" />
    
    <!-- Main Diagonal Ribbon slice -->
    <path d="M305,147 L195,253 L225,253 L305,175 Z" fill="url(#foldGrad)" />
    
    <!-- Bottom folded fold / transition connector segment -->
    <path d="M195,226 L222,253 L195,253 Z" fill="#A02D09" />
    
    <!-- Bottom Horizontal Ribbon block -->
    <path d="M195,226 L305,226 L305,253 L222,253 Z" fill="url(#ribbonGrad)" />
  </g>

  <!-- Text branding ZORA STAYS -->
  <text x="250" y="342" text-anchor="middle" class="brand-title">ZORA STAYS</text>
  
  <!-- Divider line -->
  <line x1="80" y1="370" x2="420" y2="370" stroke="#E5DCD3" stroke-width="1.5" />
  
  <!-- Tagline SMART LIVING FOR HER -->
  <text x="250" y="398" text-anchor="middle" class="brand-tagline">SMART LIVING FOR HER</text>
</svg>
